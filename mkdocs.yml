# 01. setup title with the name of the site
site_name: OpenNotesHub

theme:
  logo: assets/logos/logo.png
  favicon: octicons/book-24
  palette:
    scheme: default
    primary: black
    accent: red
  
  font:
    text: Roboto
    code: Roboto Mono
    
  name: material
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
    repo: fontawesome/brands/github

  features:
    - content.code.annotate 
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - navigation.tabs
    - navigation.instant
    - navigation.indexes
    - navigation.path
    - toc.follow
    - search.suggest
    - navigation.top
    - navigation.footer
    - navigation.instant.preview
    - navigation.tracking

repo_name: nthaihoc/open-notes-hub
repo_url: https://github.com/nthaihoc/open-notes-hub

extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css

extra_javascript:
  # - javascripts/mathjax.js  
  # - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

# 03. setup markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - def_list
  - md_in_html
  - attr_list
  - footnotes
  - meta
  - toc:
      title: Table of Contents
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.blocks.caption
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark 
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.blocks.definition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji  
      emoji_generator: !!python/name:material.extensions.emoji.to_svg 
  - tables
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - macros
  - search
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false 

  - git-committers:
      repository: nthaihoc/open-notes-hub
      branch: main
      token: !ENV MKDOCS_GIT_COMMITTERS_APIKEY

copyright: ©️ 2025 by Thai-Hoc Nguyen

# 04. setup navigation
nav:
