      - Report 01 - Introduction: research/pronunciation-scoring/experiments/01-ssl_for_pronscore.md
      - Report 02 - Baseline Models & Error Analysis: research/pronunciation-scoring/literature-review/related_work.md

  - Course Notes:
    - Course Notes: courses/README.md

    - Applied Machine Learning: courses/applied-machine-learning/README.md

    - Large Language Models:
      - Large Language Models: courses/large-language-models/README.md
      - Lesson 03. Attention Mechanisms: courses/large-language-models/lessson/lesson-03-attention_mechanisms.md
      
  - Knowledge Base:
    - Knowledge Base: knowledge-base/README.md

    # - MLOps Tutorials: knowledge-base/mlops-tutorials/README.md
    - FastAPI Tutorials:
      - FastAPI Tutorials: knowledge-base/fastapi/README.md
      - Lesson 01. FastAPI Overview and Project Setup: knowledge-base/fastapi/lesson-01-overview.md
    
    - Interview AI:
      - Cheetsheat AI for VinUI: knowledge-base/interview-ai/interview_vinui.md

  # - IAI Lab:
  #   - IAI Lab: iai-lab/README.md
  #   - Operational Framework: iai-lab/tracks.md
  #   - Guidelines: iai-lab/guidelines.md

  # - Resources:
  #   - Overview: resources/README.md

