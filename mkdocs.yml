site_name: OpenNotesHub

repo_name: nthaihoc/open-notes-hub
repo_url: https://github.com/nthaihoc/open-notes-hub

theme:
  logo: assets/images/logo.jpg
  favicon: assets/images/favicon.png
  palette:
    scheme: default
    primary: white
    accent: red
  
  font:
    text: Roboto
    code: JetBrains Mono
    
  name: material
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
    repo: fontawesome/brands/github

  features:
    - content.code.annotate 
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - navigation.tabs
    - navigation.instant
    - navigation.instant.preview
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - toc.follow
    - search.suggest
    - navigation.top
    - navigation.footer
    - navigation.tracking

extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js


markdown_extensions:
  - abbr
  - admonition
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - md_in_html
  - attr_list
  - footnotes
  - meta
  - toc:
      title: Table of Contents
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.blocks.caption
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark 
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.blocks.definition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji  
      emoji_generator: !!python/name:material.extensions.emoji.to_svg 
  - tables
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - macros
  - search
  - i18n:
      docs_structure: suffix 
      fallback_to_default: true 
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: vi
          name: Tiếng Việt
          build: true
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false 
  - git-committers:
      enabled: !ENV [CI, false] 
      repository: nthaihoc/open-notes-hub
      branch: main
      token: !ENV [MKDOCS_GIT_COMMITTERS_APIKEY, ""]

nav:
  - Home: index.md
  - About Me: about-me/README.md
  - Research Logs:
    - research/README.md
    - "Pronunciation Scoring":
      - research/pronunciation-scoring/experiments/01-ssl_for_pronscore.md
      - research/pronunciation-scoring/literature-review/related_work.md

  - Course Notes:
    - courses/README.md
    - "Applied Machine Learning": 
      - courses/applied-machine-learning/README.md
      - Lesson 01: lesson.md
      - Lesson 02: lesson.md
      - Lesson 03: lesson.md
      - Lesson 04: lesson.md
      - Lesson 05: lesson.md
      - Lesson 06: lesson.md
      - Lesson 07: lesson.md
      - courses/applied-machine-learning/lesson/lesson-08-support_vector_machines.md
      - courses/applied-machine-learning/lesson/lesson-09-decision_trees.md

    - Large Language Models:
      - Large Language Models: courses/large-language-models/README.md
      - Lesson 01: lesson.md
      - Lesson 02: lesson.md
      - Lesson 03. Attention Mechanisms: courses/large-language-models/lessson/lesson-03-attention_mechanisms.md
      - Lesson 04: lesson.md
      - Lesson 05: lesson.md
      - Lesson 06: lesson.md
      - Lesson 07: lesson.md
  
  - Knowledge Base:
    - knowledge-base/README.md
    - "❄️ FastAPI Tutorials": 
        - knowledge-base/fastapi/lesson-01-overview.md
    - "🔎 RAG Framework":
        - knowledge-base/ai-in-action/vallina_rag.md

extra:
  social:
    - icon: material/school
      link: https://ictu.edu.vn
      name: Thai Nguyen University of Information and Technology Communication
    - icon: material/domain
      link: https://iast.ictu.edu.vn
      name: Institute of Applied Science Technology
    - icon: material/web
      link: https://nthaihoc.github.io/about-me
      name: Profile
    - icon: material/email-multiple-outline
      link: mailto:thaihoc.ictu@gmail.com
      name: Email
    - icon: material/github
      link: https://github.com/nthaihoc
      name: Github
    - icon: material/facebook
      link: https://www.facebook.com/nthoc.02
      name: Facebook
  generator: false
  alternate:
      - name: English
        link: /
        lang: en
      - name: Vietnamese
        link: /vi/
        lang: vi

